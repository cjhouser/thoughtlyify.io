config:
  apiVersion: controller.config.cert-manager.io/v1alpha1
  kind: ControllerConfiguration
  logging:
    format: json
    verbosity: 2
  numberOfConcurrentWorkers: 5
  enableGatewayAPI: true
  featureGates:
    ExperimentalGatewayAPISupport: true
    LoggingBetaOptions: true

crds:
  enabled: true

global:
  leaderElection:
    namespace: certs

webhook:
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 80m
      memory: 64Mi

namespace: certs

resources:
  limits:
    memory: 64Mi
  requests:
    cpu: 80m
    memory: 64Mi

cainjector:
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 80m
      memory: 64Mi

prometheus:
  enabled: false

startupapicheck:
  resources:
    limits:
      memory: 64Mi
    requests:
      cpu: 80m
      memory: 64Mi
