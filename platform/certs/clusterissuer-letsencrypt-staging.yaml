apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging-shortlived
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: cjohouser@gmail.com
    profile: shortlived
    privateKeySecretRef:
      name: letsencrypt-staging-shortlived
    solvers:
    - dns01:
        cloudflare:
          apiTokenSecretRef:
            name: cloudflare-api-token
            key: api-token
