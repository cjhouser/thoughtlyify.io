#cloud-config
package_update: true
packages:
- iptables-persistent
runcmd:
- |
  #!/bin/bash
  echo 'net.ipv4.ip_forward=1' >> /etc/sysctl.conf
  iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
  iptables-save > /etc/iptables/rules.v4
  echo '/sbin/iptables-restore < /etc/iptables/rules.v4' >> /etc/rc.local
  reboot